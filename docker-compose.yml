services:
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

  receipt:
    build:
      context: .
      dockerfile: receipt_service/Dockerfile
    container_name: receipt
    environment:
      - SERVICE_NAME=receipt
      - REDIS_HOST=redis
    depends_on:
      - redis
    ports:
      - "5000:5000"

  rules:
    build:
      context: .
      dockerfile: rules_service/Dockerfile
    container_name: rules
    environment:
      - SERVICE_NAME=rules
      - REDIS_HOST=redis
    depends_on:
      - redis
    ports:
      - "5001:5001"
